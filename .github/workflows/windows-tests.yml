name: Windows Tests

on:
  push:
  pull_request:

jobs:
  windows-tests:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run frontend smoke test
        run: npm run test:smoke:frontend

      - name: Run Windows regression test
        run: npm run test:regression:windows
